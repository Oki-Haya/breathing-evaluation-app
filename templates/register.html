{% extends "base.html" %}
{% block title %}新規登録 - 呼吸動作評価{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="text-center mb-4 mt-2">
      <h1 class="fs-4 fw-bold">新規アカウント登録</h1>
      <p class="text-muted small">あなた専用のデータ管理を始めましょう</p>
    </div>

    <div class="card">
      <div class="card-body p-4">
        {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}

        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">ユーザー名</label>
            <input type="text" name="username" class="form-control form-control-lg"
                   autocomplete="username" required autofocus
                   placeholder="例: yamada_taro">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">パスワード</label>
            <input type="password" name="password" class="form-control form-control-lg"
                   autocomplete="new-password" required
                   placeholder="6文字以上">
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100">登録してはじめる</button>
        </form>
      </div>
    </div>

    <p class="text-center mt-3 text-muted small">
      既にアカウントをお持ちの方は
      <a href="{{ url_for('login') }}">ログイン</a>
    </p>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}ログイン - 呼吸動作評価{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="text-center mb-4 mt-2">
      <h1 class="fs-4 fw-bold">呼吸動作評価</h1>
      <p class="text-muted small">ログインしてください</p>
    </div>

    <div class="card">
      <div class="card-body p-4">
        {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}

        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">ユーザー名</label>
            <input type="text" name="username" class="form-control form-control-lg"
                   autocomplete="username" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">パスワード</label>
            <input type="password" name="password" class="form-control form-control-lg"
                   autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100">ログイン</button>
        </form>
      </div>
    </div>

    <p class="text-center mt-3 text-muted small">
      アカウントをお持ちでない方は
      <a href="{{ url_for('register') }}">新規登録</a>
    </p>
  </div>
</div>
{% endblock %}
